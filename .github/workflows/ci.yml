name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela corridas anteriores del mismo branch/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Credenciales de servicios efímeros de CI, no secretos reales (mismas que
    # docker-compose.yml usa en local). MinIO se levanta aparte (ver abajo)
    # porque el bloque `services:` no soporta pasarle un comando propio.
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://classia:classia@localhost:5434/classia_saas?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-jwt-secret-not-a-real-secret
      REFRESH_TOKEN_SECRET: ci-only-refresh-secret-not-a-real-secret
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: auto
      S3_BUCKET: classia-ci
      S3_ACCESS_KEY_ID: classia
      S3_SECRET_ACCESS_KEY: classia123
      S3_FORCE_PATH_STYLE: "true"
      EMAIL_PROVIDER: disabled

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: classia
          POSTGRES_PASSWORD: classia
          POSTGRES_DB: classia_saas
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U classia"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      # MinIO no va en `services:` porque ese bloque no permite un comando
      # propio (MinIO lo necesita: `server /data --console-address :9001`),
      # así que se levanta a mano y se espera a que responda.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=classia \
            -e MINIO_ROOT_PASSWORD=classia123 \
            minio/minio server /data --console-address ":9001"
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && exit 0
            sleep 1
          done
          echo "MinIO no respondió a tiempo" >&2
          exit 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        working-directory: packages/database
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
