services:
  postgres:
    image: postgres:16
    container_name: classia-postgres
    environment:
      POSTGRES_USER: classia
      POSTGRES_PASSWORD: classia
      POSTGRES_DB: classia_saas
    ports:
      - "5434:5432"
    volumes:
      - classia_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: classia-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: classia-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: classia
      MINIO_ROOT_PASSWORD: classia123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - classia_minio_data:/data

volumes:
  classia_postgres_data:
  classia_minio_data:
